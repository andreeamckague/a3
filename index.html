<!DOCTYPE html>
  <html lang="eng-ca">
    <head>
      <meta charset="utc-8">
      <title>Exercise 7: Typography</title>
      <!-- created by Andreea McKague on Wednesday, November 27th, 2024-->
      <style>
        body{
          background-color: #010101;
        }
        nav{
          width: 100%;
          height: 5%;
          background-color: red;
        }
        nav ul{
          float: right;
          list-style-type: none;
          margin: 0;
        }
        nav li{
          float: left;
          padding-right: 2em;
          text-align: center;
          position: relative;
        }
        nav a{
          display: block;
          text-decoration: none;
          padding-top: 0.4em;
          color: #F7F7F7;
        }
        #nav-logo{
          margin: 0;
          float: left;
        }
      </style>
    </head>
    <body>
      <nav>
        <a href="#" id="nav-logo">Logo</a>
         <ul>        
           <li><a href="#">Admissions</a></li>
           <li><a href="#">About</a></li>
           <li><a href="#">Academics</a></li>
           <li><a href="#">Alumni</a></li>
           <li><a href="#">Give</a></li>
           <li><a href="#">SearchIcon</a></li>
         </ul>
      </nav>
    </body>
</html>
